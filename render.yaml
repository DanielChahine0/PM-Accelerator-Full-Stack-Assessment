databases:
  - name: weather-db
    plan: free
    databaseName: weather_db
    user: weather_user

services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────
  - type: web
    name: weather-api
    runtime: python
    plan: free
    rootDir: ./backend
    buildCommand: |
      pip install -r requirements.txt &&
      alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: weather-db
          property: connectionString
      - key: OPENWEATHER_API_KEY
        sync: false          # you'll set this in the Render dashboard
      - key: YOUTUBE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://weather-dashboard-xxxx.onrender.com   # update after first deploy
      - key: PYTHON_VERSION
        value: "3.11"

  # ── Frontend (React / Vite static site) ────────────────────────────
  - type: web
    name: weather-dashboard
    runtime: static
    rootDir: ./frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html    # SPA client-side routing support
    envVars:
      - key: VITE_API_BASE_URL
        value: https://weather-api-xxxx.onrender.com   # update after first deploy
